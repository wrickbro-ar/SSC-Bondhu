<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGL Bondhu AI</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:#2a2f42;--accent:#f0a500;--accent2:#e05c00;--green:#22c55e;--blue:#3b82f6;--red:#ef4444;--text:#e8eaf0;--muted:#7a8099}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hind Siliguri',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.htxt h1{font-size:18px;font-weight:700;color:var(--accent)}
.htxt p{font-size:11px;color:var(--muted)}
.badge{margin-left:auto;background:rgba(34,197,94,0.15);color:var(--green);font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid rgba(34,197,94,0.3)}
.tabs{background:var(--surface2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Hind Siliguri',sans-serif}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#chat{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.welcome{background:linear-gradient(135deg,#1a1f35,#1c2030);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center}
.welcome .icon{font-size:40px;margin-bottom:10px}
.welcome h2{font-size:20px;color:var(--accent);margin-bottom:6px}
.welcome p{font-size:13px;color:var(--muted);line-height:1.6}
.qa{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.qab{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text);cursor:pointer;text-align:left;transition:all 0.2s;font-family:'Hind Siliguri',sans-serif;line-height:1.4}
.qab:hover{border-color:var(--accent);color:var(--accent)}
.qab span{display:block;font-size:16px;margin-bottom:3px}
.msg{display:flex;gap:10px;animation:fi 0.3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;align-self:flex-end}
.msg.ai .av{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.msg.user .av{background:var(--blue)}
.bubble{max-width:calc(100% - 50px);padding:12px 14px;border-radius:16px;font-size:14px;line-height:1.7}
.msg.ai .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.user .bubble{background:#1e2540;border:1px solid rgba(59,130,246,0.3);border-bottom-right-radius:4px}
.bubble strong{color:var(--accent)}
.td{display:flex;gap:4px;align-items:center}
.dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:b 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes b{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}
.input-area{background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
#userInput{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Hind Siliguri',sans-serif;font-size:14px;resize:none;outline:none;max-height:120px;min-height:44px;transition:border-color 0.2s;line-height:1.5}
#userInput:focus{border-color:var(--accent)}
#userInput::placeholder{color:var(--muted)}
#sendBtn{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#sendBtn:disabled{opacity:0.4;cursor:not-allowed}
.hint{font-size:10px;color:var(--muted);margin-top:6px;text-align:center}
.err{color:var(--red);font-size:13px}
</style>
</head>
<body>
<header>
<div class="logo">📚</div>
<div class="htxt"><h1>CGL Bondhu AI</h1><p>SSC CGL Bengali AI Tutor</p></div>
<span class="badge">✦ FREE</span>
</header>
<div class="tabs">
<div class="tab active" onclick="setSub('general',this)">সব বিষয়</div>
<div class="tab" onclick="setSub('quant',this)">Quantitative</div>
<div class="tab" onclick="setSub('reasoning',this)">Reasoning</div>
<div class="tab" onclick="setSub('english',this)">English</div>
<div class="tab" onclick="setSub('ga',this)">General Awareness</div>
</div>
<div id="chat">
<div class="welcome">
<div class="icon">🎯</div>
<h2>আমি CGL Bondhu!</h2>
<p>তোমার SSC CGL preparation এর জন্য আমি সবসময় ready।</p>
<div class="qa">
<button class="qab" onclick="quick('আমাকে Percentage chapter শুরু থেকে পড়াও')"><span>📊</span>Percentage শিখতে চাই</button>
<button class="qab" onclick="quick('Blood Relation কীভাবে solve করব?')"><span>🧠</span>Blood Relation tips</button>
<button class="qab" onclick="quick('আমার daily study routine বানিয়ে দাও। আমার ৪ ঘণ্টা আছে।')"><span>📅</span>Daily Routine চাই</button>
<button class="qab" onclick="quick('আমার mock score ৮৫/২০০। কী করব?')"><span>📝</span>Mock Analysis করো</button>
</div>
</div>
</div>
<div class="input-area">
<div class="input-row">
<textarea id="userInput" placeholder="যেকোনো question করো বাংলায়..." rows="1" onkeydown="hk(event)" oninput="ar(this)"></textarea>
<button id="sendBtn" onclick="send()">➤</button>
</div>
<div class="hint">Enter পাঠাতে · Shift+Enter নতুন লাইন</div>
</div>
<script>
let sub='general',hist=[],loading=false;
function setSub(s,el){sub=s;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active')}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function quick(t){document.getElementById('userInput').value=t;send()}
function sb(){const c=document.getElementById('chat');c.scrollTop=c.scrollHeight}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(t){let h=esc(t);h=h.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\n\n/g,'<br><br>');h=h.replace(/\n/g,'<br>');return h}
function addUser(t){const c=document.getElementById('chat');const d=document.createElement('div');d.className='msg user';d.innerHTML=`<div class="bubble">${esc(t)}</div><div class="av">👤</div>`;c.appendChild(d);sb()}
function addTyping(){const c=document.getElementById('chat');const d=document.createElement('div');d.className='msg ai';d.id='typ';d.innerHTML=`<div class="av">📚</div><div class="bubble"><div class="td"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;c.appendChild(d);sb()}
function remTyping(){const e=document.getElementById('typ');if(e)e.remove()}
function addAI(t,err){const c=document.getElementById('chat');const d=document.createElement('div');d.className='msg ai';d.innerHTML=`<div class="av">📚</div><div class="bubble">${err?'<span class="err">⚠ '+esc(t)+'</span>':fmt(t)}</div>`;c.appendChild(d);sb()}
async function send(){
if(loading)return;
const inp=document.getElementById('userInput');
const t=inp.value.trim();
if(!t)return;
inp.value='';inp.style.height='auto';
loading=true;document.getElementById('sendBtn').disabled=true;
addUser(t);
let msg=t;
if(sub!=='general'){const n={quant:'Quantitative Aptitude',reasoning:'Reasoning',english:'English',ga:'General Awareness'};msg+=`\n\n[Student এখন ${n[sub]} section এ আছে]`}
hist.push({role:'user',content:msg});
addTyping();
try{
const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:hist})});
const data=await r.json();
remTyping();
if(!r.ok){addAI(data.error||'সমস্যা হয়েছে।',true)}
else{hist.push({role:'assistant',content:data.reply});addAI(data.reply)}
}catch(e){remTyping();addAI('Connection error। আবার try করো।',true)}
loading=false;document.getElementById('sendBtn').disabled=false;
document.getElementById('userInput').focus();
}
</script>
</body>
</html>
